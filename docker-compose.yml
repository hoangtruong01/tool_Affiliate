version: "3.9"

services:
  # ============================
  # PostgreSQL 16 — Primary Database
  # ============================
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-affiliate_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_strong_password}
      POSTGRES_DB: ${POSTGRES_DB:-affiliate_tool}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-affiliate_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================
  # Redis 7 — Cache + Job Queue
  # ============================
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================
  # FastAPI Backend — REST API
  # ============================
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
      - ./media:/app/media
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================
  # Celery Worker — Background Jobs
  # ============================
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    command: >
      celery -A app.worker worker
      --loglevel=info
      -Q ai_tasks,render_tasks,publish_tasks
      --concurrency=2
    volumes:
      - ./backend/app:/app/app
      - ./media:/app/media
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ============================
  # Celery Beat — Task Scheduler
  # ============================
  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    command: >
      celery -A app.worker beat
      --loglevel=info
      --schedule=/tmp/celerybeat-schedule
    depends_on:
      redis:
        condition: service_healthy

  # ============================
  # Next.js Frontend — Dashboard
  # ============================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    depends_on:
      - api

  # ============================
  # n8n — Workflow Automation (DISABLED FOR MVP)
  # ============================
  # n8n:
  #   image: n8nio/n8n:latest
  #   restart: unless-stopped
  #   ports:
  #     - "5678:5678"
  #   environment:
  #     - N8N_BASIC_AUTH_ACTIVE=true
  #     - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER:-admin}
  #     - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD:-changeme_n8n}
  #     - WEBHOOK_URL=http://n8n:5678/
  #   volumes:
  #     - n8n_data:/home/node/.n8n

volumes:
  pgdata:
  redisdata:
